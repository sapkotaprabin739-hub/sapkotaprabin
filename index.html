
    l<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sakura Hotel Login</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0d6efd;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    width:350px;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#0d6efd;
    color:white;
    border:none;
    cursor:pointer;
    font-size:18px;
}

button:hover{
    background:#084298;
}
</style>

</head>
<body>

<div class="login-box">

<h1>🏨 Sakura Hotel</h1>

<h3>Hotel Management System</h3>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

let username=document.getElementById("username").value.trim();

let password=document.getElementById("password").value.trim();

if(username==="admin" && password==="1234"){

window.location.href="dashboard.html";

}else{

alert("Wrong Username or Password");

}

}
<h2>Welcome to Sakura Hotel</h2>

</script>

<body>
    <script src="script.js"></script>
</body>
</body>
</html>
