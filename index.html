<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sakura Hotel Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#f8bbd0,#f48fb1);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:380px;
    background:white;
    padding:35px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.logo{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:15px;
}

h1{
    color:#e91e63;
}

p{
    color:gray;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#e91e63;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:18px;
}

button:hover{
    background:#c2185b;
}
</style>

</head>

<body>

<div class="login-box">

<img src="img/logo.png" class="logo" alt="Logo">

<h1>🏨 Sakura Hotel</h1>

<p>Hotel Management System</p>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

let username=document.getElementById("username").value.trim();

let password=document.getElementById("password").value.trim();

if(username==="admin" && password==="1234"){

window.location.href="dashboard.html";

}else{

alert("Wrong Username or Password");

}

}

</script>

</body>
</html>
